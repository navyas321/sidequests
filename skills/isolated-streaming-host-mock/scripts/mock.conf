# Minimal isolated-mock config for a Sunshine/Apollo/Vibepollo host.
# Place this at <prefix>\config\sunshine.conf inside the COPIED install prefix (not the real one).
#
# `port` is the BASE — every other port the host opens is derived from it as an offset
# (web UI = base+1, HTTPS = base-5, RTSP = base+21, the UDP media ports = base+9..+13, ...).
# Set the base far from the real host's default 47989 so nothing collides. Only these two
# keys are strictly needed for an isolated mock; the copied prefix supplies everything else.

port = 48900                    # offset base -> no collision with the real host (default 47989)
sunshine_name = Example-Mock-Host   # the name the client discovers over mDNS

# Do NOT set `dd_configuration_option = ensure_primary` in a mock — that would let it grab the
# physical display. Leave display config default so idle captures nothing and a stream uses the
# virtual display driver (e.g. SudoVDA) instead of the monitor you game on.
